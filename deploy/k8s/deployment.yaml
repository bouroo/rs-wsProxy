apiVersion: apps/v1
kind: Deployment
metadata:
  name: rs-wsProxy
  labels:
    app: rs-wsProxy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rs-wsProxy
  template:
    metadata:
      labels:
        app: rs-wsProxy
    spec:
      containers:
        - name: rs-wsProxy
          image: ghcr.io/bouroo/rs-wsProxy:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5999
              name: websocket
          env:
            - name: WSPROXY_THREADS
              value: "4"
          readinessProbe:
            httpGet:
              path: /
              port: 5999
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 5999
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "500m"
