services:
  wsproxy:
    build:
      context: .
      dockerfile: Containerfile
    image: ghcr.io/bouroo/rs-wsProxy:latest
    container_name: wsproxy
    ports:
      - "5999:5999"
    environment:
      - WSPROXY_THREADS=4
    # Override default command as needed:
    # command: ["-a", "127.0.0.1:6900"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5999/"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
