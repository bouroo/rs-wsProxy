name: CD

on:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt -- --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Build
        run: cargo build --release
      - name: Test
        run: cargo test

  build-and-push:
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Containerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  check-k8s-config:
    needs: build-and-push
    runs-on: ubuntu-latest
    outputs:
      has_kubeconfig: ${{ steps.check.outputs.has_kubeconfig }}
    steps:
      - id: check
        run: |
          if [ -n "${{ secrets.KUBECONFIG }}" ]; then
            echo "has_kubeconfig=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_kubeconfig=false" >> "$GITHUB_OUTPUT"
          fi

  deploy-k8s:
    needs: [build-and-push, check-k8s-config]
    runs-on: ubuntu-latest
    if: needs.check-k8s-config.outputs.has_kubeconfig == 'true'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v5
        with:
          version: "latest"
      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
      - name: Set image tag
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          sed -i "s|ghcr.io/${{ github.repository }}:latest|ghcr.io/${{ github.repository }}:${VERSION}|g" deploy/k8s/deployment.yaml
      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f deploy/k8s/
          kubectl rollout status deployment/rs-wsProxy --timeout=120s
